# XcodeGen spec → `xcodegen generate` makes PhotoSweep.xcodeproj.
# project.yml is the source of truth; the .xcodeproj is generated & git-ignored.
name: PhotoSweep
options:
  bundleIdPrefix: co.superduperai
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  knownRegions: [en, ru]

settings:
  base:
    # Xcode 26 ships Explicitly Built Modules on by default; its clang dependency
    # scanner (clang -E -dM -isysroot … /dev/null) intermittently HANGS and stalls
    # the whole build. Revert to implicit modules — durable fix for "build froze".
    # (Same workaround as reelcam.) See Makefile GUARD_ON for the runtime safety net.
    CLANG_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_ENABLE_EXPLICIT_MODULES: NO

targets:
  PhotoSweep:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: PhotoSweep
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Why we touch the photo library — shown in the system permission prompt.
        NSPhotoLibraryUsageDescription: >-
          PhotoSweep scans your photo library to find large videos and screenshots
          you can delete to free up storage. Nothing leaves your device.
        NSPhotoLibraryAddUsageDescription: >-
          PhotoSweep never adds photos; this is only present because deletion uses
          the same read-write library access.
        # canOpenURL allowlist for the "App cleanup guide" deep links (iOS caps ~50).
        # We can only OPEN these apps — iOS forbids reading/clearing their caches.
        LSApplicationQueriesSchemes:
          - tg
          - instagram
          - whatsapp
          - tiktok
          - snssdk1233
          - youtube
          - vnd.youtube
          - fb
          - fb-messenger
          - snapchat
          - spotify
          - twitter
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 1            # iPhone only
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: co.superduperai.photosweep
        DEVELOPMENT_TEAM: J6JLR9Y684

  PhotoSweepTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/PhotoSweepTests
    dependencies:
      - target: PhotoSweep
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: co.superduperai.photosweep.tests

schemes:
  PhotoSweep:
    build:
      targets:
        PhotoSweep: all
        PhotoSweepTests: [test]
    test:
      targets:
        - PhotoSweepTests
