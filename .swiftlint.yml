included:
  - Sources
  - Tests

disabled_rules:
  - trailing_whitespace
  - todo               # AI-TODO / AI-NOTE comments are intentional

opt_in_rules:
  - empty_count
  - closure_spacing
  - explicit_init

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length: 2
  excluded: [id, x, y]
